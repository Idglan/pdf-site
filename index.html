<!DOCTYPE html>
<html>
<body>
<script>
  let hash = window.location.hash;
  let page = 1;
  let file = "";

  if (hash.includes("page=")) {
    page = hash.split("page=")[1].split("&")[0];
  }

  if (hash.includes("file=")) {
    file = hash.split("file=")[1].split("&")[0];
  }

  if (!file) {
    document.body.innerHTML = "Erro: nenhum PDF especificado.";
  } else {
    window.location.href = "https://mozilla.github.io/pdf.js/web/viewer.html?file=" + file + "#page=" + page;
  }
</script>
</body>
</html>
